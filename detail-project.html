<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="./assets/logowh.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { kancah: { blue: '#0006ff', dark: '#111111' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Ubuntu', sans-serif; background-color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .footer-marquee-content { display: flex; width: max-content; animation: footer-marquee 20s linear infinite; }
        @keyframes footer-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* --- FREEFORM ARTIKEL CONTAINER --- */
        #p-content { 
            box-sizing: border-box; 
            width: 100%; 
            position: relative; 
            display: block;
            overflow: visible !important; /* Biarkan kalkulasi JS menentukan tinggi pastinya */
        }
        #p-content * { box-sizing: border-box; }

        /* Pertahankan posisi absolut bawaan admin agar layout desktop & mobile sama persis */
        #p-content img {
            max-width: none !important; /* Jangan dipaksa 100% biar skala drag admin gak rusak */
            height: auto !important;
        }

        #p-content p { position: relative; margin-bottom: 1.25rem; line-height: 1.75; color: #4b5563; font-weight: 300; }
        #p-content h1, #p-content h2, #p-content h3 { font-weight: 700; letter-spacing: -0.02em; color: #111111; margin: 2rem 0 1rem; }
        #p-content > *:first-child { margin-top: 0 !important; }
        #p-content h1 { font-size: 2.5rem; }
        #p-content h2 { font-size: 2rem; }
        #p-content h3 { font-size: 1.5rem; }
        #p-content ul, #p-content ol { margin: 0 0 1.25rem 1.5rem; color: #4b5563; font-weight: 300; }
        #p-content a { color: #0006ff; text-decoration: underline; }
        #p-content blockquote { border-left: 3px solid #0006ff; padding-left: 1.25rem; margin: 1.5rem 0; font-style: italic; color: #374151; }
        
        iframe.ql-video, .kf-yt-frame { width: 100%; aspect-ratio: 16 / 9; height: auto; border: 0; margin: 1.5rem 0; display: block; border-radius: 0.75rem; }
        .web-preview-frame { width: 100%; height: 75vh; border: 1px solid #e2e8f0; border-radius: 1.5rem; background: white; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); margin-top: 1.5rem; }
    </style>
</head>
<body class="text-kancah-dark overflow-x-hidden selection:bg-kancah-blue selection:text-white">

    <nav class="fixed w-full z-[100] top-0 bg-white/80 backdrop-blur-xl border-b border-gray-100 h-16 sm:h-20 transition-all duration-300">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 h-full flex justify-between items-center relative">
            <div class="flex-none"><a href="/"><img src="assets/kancah-logo.png" alt="Kancah Logo" class="h-6 sm:h-9 w-auto object-contain"></a></div>
            <div class="hidden lg:flex gap-6 xl:gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-[#111111]">
                <a href="about" class="hover:text-kancah-blue transition-colors">Agency</a>
                <a href="services" class="hover:text-kancah-blue transition-colors">Capabilities</a>
                <a href="works" class="text-kancah-blue font-black transition-colors decoration-2">Work</a>
                <a href="pricelist" class="hover:text-kancah-blue transition-colors">Pricelist</a>
                <a href="careers" class="hover:text-kancah-blue transition-colors">Careers</a>
            </div>
            <div class="flex items-center gap-2 sm:gap-4 h-8"> 
                <div id="weather-module-desktop" class="relative group hidden sm:block">
                    <div class="flex flex-col items-center justify-center h-[52px] min-w-[210px] px-8 bg-transparent border border-[#0006ff] rounded-full select-none transition-all duration-300">
                        <div class="flex items-center justify-center gap-4 tabular-nums font-black text-[17px] text-[#111111] tracking-[0.05em] leading-none">
                            <span id="nav-time">00:00:00</span> <span class="text-[#0006ff] font-black">|</span> <span id="nav-temp">--°C</span>
                        </div>
                    </div>
                </div>
                <button class="lg:hidden flex items-center justify-center w-8 h-8 text-[#111111]" id="mobile-menu-button"><i class="fa-solid fa-bars-staggered text-base"></i></button>
            </div>
        </div>
    </nav>

    <div id="nav-spacer"></div>

    <main class="pb-12">
        <section id="hero-cover" class="relative w-full">
            <div id="hero-image-wrap" class="relative w-full bg-kancah-dark overflow-hidden flex items-center justify-center">
                <img id="p-image" src="" alt="" class="w-full h-full object-cover">
            </div>
            <div class="max-w-[1100px] mx-auto px-4 sm:px-6">
                <div class="pt-8 lg:pt-10 pb-6 lg:pb-8 border-b border-gray-100 grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-16">
                    <div class="lg:col-span-8">
                        <span id="p-category" class="text-kancah-blue font-black text-[10px] uppercase tracking-[0.3em] block mb-3">Category</span>
                        <h1 id="p-title" class="text-4xl lg:text-6xl font-bold tracking-tighter leading-[1.05] uppercase italic text-kancah-dark mb-6">Loading...</h1>
                        <p id="p-description" class="hidden text-sm lg:text-lg text-gray-500 leading-relaxed font-light max-w-2xl"></p>
                        <div id="live-preview-btn-container" class="hidden mt-6">
                            <button onclick="toggleHtmlLivePreview()" id="btn-toggle-preview" class="inline-flex items-center justify-center px-6 py-3 bg-kancah-blue text-white rounded-full font-bold uppercase tracking-[0.15em] text-[11px] hover:bg-kancah-dark transition-all gap-2"><i class="fa-solid fa-laptop-code"></i> <span>Live Preview Website</span></button>
                        </div>
                    </div>
                    <div class="lg:col-span-4 lg:pt-1"><div id="p-tags" class="flex flex-col gap-2"></div></div>
                </div>
            </div>
        </section>

        <section id="html-preview-section" class="max-w-[1100px] mx-auto px-4 sm:px-6 hidden">
            <iframe id="web-demo-iframe" src="" class="web-preview-frame"></iframe>
        </section>

        <div class="max-w-[1100px] mx-auto px-4 sm:px-6 relative">
            <article id="p-content" class="pt-6"></article>
        </div>

        <div class="max-w-[1100px] mx-auto px-4 sm:px-6 mt-12 border-t border-gray-100 pt-6 flex flex-col items-center justify-center gap-4 relative z-20">
            <nav class="flex items-center gap-3 flex-wrap justify-center">
                <a id="prev-project-link" href="#" class="hidden items-center gap-2 font-bold text-sm text-kancah-dark hover:text-kancah-blue"><span aria-hidden="true">←</span><span id="prev-project-title"></span></a>
                <span id="prev-next-divider" class="hidden text-gray-300">|</span>
                <a id="next-project-link" href="#" class="hidden items-center gap-2 font-bold text-sm text-kancah-dark hover:text-kancah-blue"><span id="next-project-title"></span><span aria-hidden="true">→</span></a>
            </nav>
            <a href="works" class="group relative inline-flex items-center justify-center px-9 py-3.5 bg-kancah-dark text-white rounded-full overflow-hidden transition-all hover:bg-kancah-blue text-[10px] font-black uppercase tracking-[0.2em]">See All Projects</a>
        </div>
    </main>

    <footer class="bg-[#111111] text-white overflow-hidden border-t border-white/10 text-sm font-sans">
        <div class="max-w-[1400px] mx-auto px-6 py-8 text-center text-gray-500 text-[10px] font-bold tracking-widest uppercase">
            <p>&copy; 2026 PT. Kancah Media Sejahtera. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        const SB_URL = 'https://hmzwjceomnneiczbpban.supabase.co';
        const SB_KEY = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(SB_URL, SB_KEY);
        window.currentProjectDemoUrl = null;

        async function getProjectDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('id');
            if (!slug) { window.location.href = 'works'; return; }
            const { data: project, error } = await kancah.from('projects').select('*').eq('slug', slug).single();
            if (error || !project) return;

            document.getElementById('page-title').innerText = `${project.title} • Kancah`;
            document.getElementById('p-title').innerText = project.title;
            document.getElementById('p-category').innerText = project.category;
            document.getElementById('p-image').src = project.image_url;

            if (project.category === 'Web Development' && project.demo_url) {
                window.currentProjectDemoUrl = project.demo_url;
                document.getElementById('live-preview-btn-container').classList.remove('hidden');
            }

            renderFreeformContent(project);
            loadAdjacentProjects(slug);
        }

        /* --- DETEKTIF KOORDINAT SEJATI ANTI-WHITESPACE HANTU --- */
        function normalizeContentImageWidths() {
            const container = document.getElementById('p-content');
            if (!container) return;

            // Pastikan container bersih dari kuncian lama sebelum kalkulasi ulang
            container.style.height = 'auto';

            const images = container.querySelectorAll('img');
            let absoluteMaxBottom = 0;

            images.forEach(img => {
                // Ambil tinggi top asli paragraf pembungkus gambar
                const parentParagraph = img.closest('p');
                const parentTop = parentParagraph ? parentParagraph.offsetTop : 0;

                // Baca manual nilai inline top asli gambar
                const inlineTop = parseFloat(img.style.top) || 0;
                let transformY = 0;

                // Ekstrak nilai translate jika di-drag melayang bebas di admin
                const transformStr = img.style.transform || '';
                const match = transformStr.match(/translate\(\s*(-?[\d.]+)%\s*,\s*(-?[\d.]+)%\s*\)/);
                if (match) {
                    const percentY = parseFloat(match[2]);
                    transformY = (percentY / 100) * (img.offsetHeight || 0);
                }

                // Kalkulasikan posisi sejati pixel ujung paling bawah gambar kolase
                const realImgBottom = parentTop + inlineTop + transformY + (img.offsetHeight || 0);
                
                if (realImgBottom > absoluteMaxBottom) {
                    absoluteMaxBottom = realImgBottom;
                }
            });

            // Potong paksa tinggi kontainer artikel tepat di bawah batas gambar terluar!
            if (absoluteMaxBottom > 0) {
                const nativeScrollHeight = container.scrollHeight;
                container.style.height = `${Math.max(absoluteMaxBottom + 20, nativeScrollHeight)}px`;
            } else {
                container.style.height = 'auto';
            }

            if (typeof syncNavSpacer === 'function') syncNavSpacer();
        }

        function renderFreeformContent(project) {
            const container = document.getElementById('p-content');
            if (project.content_html) {
                container.innerHTML = project.content_html;
                
                // Pemicu instan begitu aset gambar ter-render
                setTimeout(normalizeContentImageWidths, 150);
                container.querySelectorAll('img').forEach(img => {
                    img.addEventListener('load', normalizeContentImageWidths);
                });
            }
        }

        async function loadAdjacentProjects(currentSlug) {
            const { data: list } = await kancah.from('projects').select('slug, title').order('id', { ascending: true });
            if (!list || list.length < 2) return;
            const idx = list.findIndex(p => p.slug === currentSlug); if (idx === -1) return;
            const prev = list[(idx - 1 + list.length) % list.length]; const next = list[(idx + 1) % list.length];
            const prevLink = document.getElementById('prev-project-link'); const nextLink = document.getElementById('next-project-link');
            if (prevLink && prev) { prevLink.href = `?id=${prev.slug}`; document.getElementById('prev-project-title').innerText = prev.title; prevLink.classList.remove('hidden'); }
            if (nextLink && next) { nextLink.href = `?id=${next.slug}`; document.getElementById('next-project-title').innerText = next.title; nextLink.classList.remove('hidden'); }
        }

        function syncNavSpacer() {
            const nav = document.querySelector('nav.fixed'); const spacer = document.getElementById('nav-spacer');
            if (spacer && nav) spacer.style.height = nav.offsetHeight + 'px';
            const heroWrap = document.getElementById('hero-image-wrap'); if (heroWrap && nav) heroWrap.style.height = (window.innerHeight - nav.offsetHeight) + 'px';
        }

        document.addEventListener('DOMContentLoaded', () => {
            getProjectDetail(); syncNavSpacer();
            window.addEventListener('resize', () => { syncNavSpacer(); normalizeContentImageWidths(); });
        });
    </script>
</body>
</html>
