<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Links • Kancah</title>
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons (Ubuntu Font persis Kancah) -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Konfigurasi Tailwind (Persis Kancah Web) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { 
                        kancah: { 
                            blue: '#0006ff', 
                            dark: '#111111', 
                            gray: '#393939', 
                            light: '#f4f4f5' 
                        } 
                    },
                    backgroundImage: {
                        'tech-pattern': "radial-gradient(circle at 2px 2px, rgba(0, 6, 255, 0.05) 1px, transparent 0)"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Ubuntu', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animasi masuk */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>

<body class="bg-white text-kancah-dark selection:bg-kancah-blue selection:text-white overflow-x-hidden bg-tech-pattern bg-[length:24px_24px] min-h-screen flex justify-center pb-12">

    <!-- Container Utama -->
    <div class="w-full max-w-[600px] px-6 pt-16 sm:pt-20 relative z-10">

        <!-- ==========================================
             1. HEADER EDITORIAL (Ala Kancah Web)
        =========================================== -->
        <div class="mb-14 text-left animate-fade-up">
            <div class="flex items-center justify-between mb-8">
                <img src="./assets/kancah-logo.png" alt="Kancah Logo" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/150?text=KANCAH'">
                
                <!-- Social Media -->
                <div class="flex items-center gap-4 text-xl">
                    <a href="https://www.instagram.com/kancahcom" target="_blank" class="text-gray-400 hover:text-kancah-blue transition-colors"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/company/kancah/" target="_blank" class="text-gray-400 hover:text-kancah-blue transition-colors"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="https://wa.me/628924687866" target="_blank" class="text-gray-400 hover:text-kancah-blue transition-colors"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>

            <span class="text-kancah-blue font-bold text-[10px] sm:text-xs uppercase tracking-[0.3em] block mb-3">Connect With Us</span>
            <h1 class="text-5xl sm:text-6xl font-black tracking-tighter leading-[0.85] uppercase">
                OFFICIAL <br> <span class="text-kancah-blue italic">LINKS.</span>
            </h1>
            <p class="text-gray-500 text-sm mt-5 font-light leading-relaxed">
                Satu pintu untuk semua akses ke Kancah Creative. Jelajahi karya kami atau mari mulai diskusi untuk brand kamu.
            </p>
        </div>

        <!-- ==========================================
             2. BUTTON LINKS (Ala Filter Kancah)
        =========================================== -->
        <div id="links-container" class="space-y-3 mb-16 animate-fade-up" style="animation-delay: 0.1s; opacity: 0;">
            <!-- Loading State -->
            <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                Memuat tautan... <i class="fa-solid fa-spinner fa-spin ml-2"></i>
            </div>
        </div>

        <!-- ==========================================
             3. CONTACT FORM (Identik contact.html)
        =========================================== -->
        <div class="border-t border-gray-100 pt-12 animate-fade-up" style="animation-delay: 0.2s; opacity: 0;">
            <div class="mb-10 text-left">
                <span class="text-kancah-blue font-bold text-[10px] sm:text-xs uppercase tracking-[0.3em] block mb-2">Yuk, Hubungi Kami</span>
                <h2 class="text-4xl sm:text-5xl font-black tracking-tighter leading-[0.85] uppercase">
                    MULAI <span class="text-kancah-blue italic">PROYEK.</span>
                </h2>
            </div>

            <form id="leadForm" class="space-y-6 sm:space-y-8">
                
                <!-- Inputs -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8">
                    <div class="relative group">
                        <input type="text" id="nama" required class="peer w-full bg-transparent border-b-2 border-gray-200 py-3 text-lg font-bold text-kancah-dark focus:outline-none focus:border-kancah-blue transition-colors placeholder-transparent" placeholder="Nama">
                        <label for="nama" class="absolute left-0 -top-3.5 text-gray-400 text-[10px] font-bold uppercase tracking-widest transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-normal peer-focus:-top-3.5 peer-focus:text-gray-400 peer-focus:text-[10px] peer-focus:font-bold">Nama Panggilan</label>
                    </div>
                    <div class="relative group">
                        <input type="text" id="instansi" class="peer w-full bg-transparent border-b-2 border-gray-200 py-3 text-lg font-bold text-kancah-dark focus:outline-none focus:border-kancah-blue transition-colors placeholder-transparent" placeholder="Brand">
                        <label for="instansi" class="absolute left-0 -top-3.5 text-gray-400 text-[10px] font-bold uppercase tracking-widest transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-normal peer-focus:-top-3.5 peer-focus:text-gray-400 peer-focus:text-[10px] peer-focus:font-bold">Instansi / Brand</label>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8">
                    <div class="relative group">
                        <input type="email" id="email" required class="peer w-full bg-transparent border-b-2 border-gray-200 py-3 text-lg font-bold text-kancah-dark focus:outline-none focus:border-kancah-blue transition-colors placeholder-transparent" placeholder="Email">
                        <label for="email" class="absolute left-0 -top-3.5 text-gray-400 text-[10px] font-bold uppercase tracking-widest transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-normal peer-focus:-top-3.5 peer-focus:text-gray-400 peer-focus:text-[10px] peer-focus:font-bold">Email Aktif</label>
                    </div>
                    <div class="relative group">
                        <input type="tel" id="wa" required class="peer w-full bg-transparent border-b-2 border-gray-200 py-3 text-lg font-bold text-kancah-dark focus:outline-none focus:border-kancah-blue transition-colors placeholder-transparent" placeholder="WhatsApp">
                        <label for="wa" class="absolute left-0 -top-3.5 text-gray-400 text-[10px] font-bold uppercase tracking-widest transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-normal peer-focus:-top-3.5 peer-focus:text-gray-400 peer-focus:text-[10px] peer-focus:font-bold">No. WhatsApp</label>
                    </div>
                </div>

                <!-- Checkbox Layanan Ala Filter Button web Kancah -->
                <div class="pt-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Layanan Kebutuhan</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer relative">
                            <input type="checkbox" name="services" value="Brand Design" class="peer sr-only">
                            <div class="px-5 py-2.5 rounded-full bg-white border border-gray-200 text-[9px] font-black uppercase tracking-widest text-gray-500 transition-all hover:border-kancah-blue peer-checked:bg-kancah-blue peer-checked:text-white peer-checked:border-kancah-blue peer-checked:shadow-lg peer-checked:shadow-kancah-blue/20">
                                Brand Design
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" name="services" value="Promotion" class="peer sr-only">
                            <div class="px-5 py-2.5 rounded-full bg-white border border-gray-200 text-[9px] font-black uppercase tracking-widest text-gray-500 transition-all hover:border-kancah-blue peer-checked:bg-kancah-blue peer-checked:text-white peer-checked:border-kancah-blue peer-checked:shadow-lg peer-checked:shadow-kancah-blue/20">
                                Promotion
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" name="services" value="Tech Dev" class="peer sr-only">
                            <div class="px-5 py-2.5 rounded-full bg-white border border-gray-200 text-[9px] font-black uppercase tracking-widest text-gray-500 transition-all hover:border-kancah-blue peer-checked:bg-kancah-blue peer-checked:text-white peer-checked:border-kancah-blue peer-checked:shadow-lg peer-checked:shadow-kancah-blue/20">
                                Tech Dev
                            </div>
                        </label>
                        <label class="cursor-pointer relative">
                            <input type="checkbox" name="services" value="Audio Visual" class="peer sr-only">
                            <div class="px-5 py-2.5 rounded-full bg-white border border-gray-200 text-[9px] font-black uppercase tracking-widest text-gray-500 transition-all hover:border-kancah-blue peer-checked:bg-kancah-blue peer-checked:text-white peer-checked:border-kancah-blue peer-checked:shadow-lg peer-checked:shadow-kancah-blue/20">
                                Audio Visual
                            </div>
                        </label>
                    </div>
                </div>

                <div class="relative group pt-4">
                    <textarea id="pesan" required rows="1" class="peer w-full bg-transparent border-b-2 border-gray-200 py-3 text-lg font-bold text-kancah-dark focus:outline-none focus:border-kancah-blue transition-colors placeholder-transparent resize-none h-auto min-h-[60px]" placeholder="Pesan" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <label for="pesan" class="absolute left-0 -top-3.5 text-gray-400 text-[10px] font-bold uppercase tracking-widest transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-placeholder-shown:top-3 peer-placeholder-shown:font-normal peer-focus:-top-3.5 peer-focus:text-gray-400 peer-focus:text-[10px] peer-focus:font-bold">Ceritain Dikit Kebutuhanmu</label>
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="btn-submit" class="w-full group relative inline-flex items-center justify-center gap-3 bg-kancah-dark text-white px-8 py-5 rounded-full font-bold uppercase tracking-widest text-[11px] hover:bg-kancah-blue transition-all duration-300 shadow-xl overflow-hidden">
                        <span class="relative z-10">Kirim Sinyal</span>
                        <i class="fa-solid fa-paper-plane relative z-10 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Copyright -->
        <div class="mt-16 text-center border-t border-gray-200 pt-6">
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">© 2026 PT. Kancah Media Sejahtera.</p>
        </div>

    </div>

    <script>
        // Supabase Init
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // Fetch Links from DB
        async function loadLinks() {
            const container = document.getElementById('links-container');
            
            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Belum ada tautan aktif.</p>';
                    return;
                }

                // Render tombol Links dengan style Typographic Kancah
                container.innerHTML = data.map(l => `
                    <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
                       class="group relative w-full flex items-center justify-between bg-white border border-gray-200 py-[18px] px-8 rounded-[2rem] hover:border-kancah-blue hover:bg-gray-50 transition-all duration-300">
                        <span class="font-bold text-[11px] sm:text-xs uppercase tracking-[0.2em] text-kancah-dark group-hover:text-kancah-blue transition-colors">${l.title}</span>
                        <i class="fa-solid fa-arrow-right -rotate-45 text-gray-300 group-hover:text-kancah-blue group-hover:rotate-0 transition-transform duration-300"></i>
                    </a>
                `).join('');
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-red-500">Gagal memuat tautan.</p>';
            }
        }

        // Track Click
        async function trackClick(id) {
            try {
                const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
                if(data) await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
            } catch (err) {}
        }

        // Form Submit
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = '<span class="relative z-10">MENGIRIM... <i class="fa-solid fa-spinner fa-spin ml-2"></i></span>';
            btn.disabled = true;

            const services = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(c => c.value).join(', ');

            try {
                const { error } = await kancah.from('leads').insert([{
                    nama: document.getElementById('nama').value,
                    email: document.getElementById('email').value,
                    whatsapp: document.getElementById('wa').value,
                    instansi: document.getElementById('instansi').value,
                    services: services,
                    pesan: document.getElementById('pesan').value
                }]);

                if (error) throw error;
                alert('Sinyal berhasil dikirim! Tim Kancah akan segera menghubungi Anda.');
                e.target.reset();
                document.getElementById('pesan').style.height = '';
            } catch (err) {
                alert('Terjadi kesalahan. Silakan coba hubungi via WhatsApp langsung.');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        };

        // Init
        loadLinks();
    </script>
</body>
</html>
