<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { kancah: { blue: '#0006ff', dark: '#111111' } }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Ubuntu', sans-serif; 
            /* Gradient 3 titik: Biru (Kanan Atas) -> Hitam (Tengah) -> Biru (Kiri Bawah) */
            background: linear-gradient(135deg, #0006ff 0%, #111111 40%, #111111 60%, #0006ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="text-white selection:bg-kancah-blue selection:text-white overflow-hidden relative flex flex-col items-center justify-center">

    <!-- Tech Pattern Tipis -->
    <div class="fixed inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(#ffffff 1px, transparent 0); background-size: 30px 30px;"></div>

    <div class="w-full max-w-[550px] px-6 py-12 relative z-10 flex flex-col items-center min-h-screen overflow-y-auto no-scrollbar">
        
        <!-- Status -->
        <div class="mb-8 opacity-0 animate-fade-up">
            <div class="flex items-center justify-center gap-3 bg-black/40 backdrop-blur-md border border-white/10 px-5 py-2 rounded-full">
                <div class="relative flex h-2 w-2">
                    <span class="animate-ping absolute h-full w-full rounded-full bg-kancah-blue opacity-75"></span>
                    <span class="relative rounded-full h-2 w-2 bg-kancah-blue"></span>
                </div>
                <div class="flex gap-2 font-bold text-[10px] uppercase tracking-[0.2em] text-gray-300">
                    <span>Kancah HQ</span>
                    <span class="text-kancah-blue">|</span>
                    <span id="live-time">00:00 WIB</span>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div class="w-full text-center flex flex-col items-center opacity-0 animate-fade-up delay-100">
            <div class="mb-5 flex justify-center">
                <img src="./assets/kancah png.png" alt="Kancah Logo" class="h-28 w-auto object-contain drop-shadow-2xl" onerror="this.src='https://via.placeholder.com/150?text=KANCAH'">
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase text-white leading-none">@kancahcom</h1>
            <p class="text-gray-400 text-[11px] uppercase tracking-[0.2em] mt-3 font-bold">Dream. Play. Create.</p>
        </div>

        <!-- Links -->
        <div id="links-container" class="w-full space-y-4 mt-10 opacity-0 animate-fade-up delay-200">
            <div class="text-center text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                Menghubungkan... <i class="fa-solid fa-circle-notch fa-spin ml-2"></i>
            </div>
        </div>

        <!-- Socials -->
        <div class="mt-12 mb-8 opacity-0 animate-fade-up delay-300">
            <div class="bg-black/40 backdrop-blur-xl border border-white/10 rounded-full px-8 py-4 flex items-center justify-center gap-8 text-2xl shadow-lg">
                <a href="https://www.instagram.com/kancahcom" target="_blank" class="text-gray-400 hover:text-white transition-all"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.linkedin.com/company/kancah/" target="_blank" class="text-gray-400 hover:text-white transition-all"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://wa.me/628924687866" target="_blank" class="text-gray-400 hover:text-white transition-all"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

    <script>
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        async function loadLinks() {
            const container = document.getElementById('links-container');
            try {
                const { data } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
                if (data) {
                    container.innerHTML = data.map((l, index) => {
                        const num = String(index + 1).padStart(2, '0');
                        return `
                        <a href="${l.url}" target="_blank" 
                           class="group relative w-full flex items-center bg-white py-5 px-8 rounded-full hover:bg-kancah-blue transition-all duration-500 shadow-xl hover:-translate-y-1">
                            <span class="absolute left-6 text-3xl font-black italic text-kancah-blue group-hover:text-white/20 transition-colors">
                                ${num}
                            </span>
                            <span class="font-bold text-[11px] sm:text-xs uppercase tracking-[0.15em] text-kancah-dark group-hover:text-white transition-colors text-center w-full mx-8">
                                ${l.title}
                            </span>
                            <div class="absolute right-3 w-10 h-10 rounded-full bg-kancah-blue flex items-center justify-center group-hover:bg-white transition-all duration-300">
                                <i class="fa-solid fa-arrow-right -rotate-45 text-white group-hover:text-kancah-blue group-hover:rotate-0 transition-all duration-300 text-xs"></i>
                            </div>
                        </a>
                        `;
                    }).join('');
                }
            } catch (err) { container.innerHTML = '<p class="text-center text-red-500">Error.</p>'; }
        }
        
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-time').innerText = `${h}:${m} WIB`;
        }
        setInterval(updateTime, 1000);
        updateTime();
        loadLinks();
    </script>
</body>
</html>
