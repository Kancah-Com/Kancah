<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah</title>
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Konfigurasi Tailwind (Kancah Style) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { 
                        kancah: { 
                            blue: '#0006ff', 
                            dark: '#111111', 
                            gray: '#393939', 
                            light: '#f4f4f5' 
                        } 
                    },
                    backgroundImage: {
                        'tech-pattern': "radial-gradient(circle at 2px 2px, rgba(0, 6, 255, 0.05) 1px, transparent 0)"
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Ubuntu', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animasi masuk elemen */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        
        /* Glass/Glow Effect untuk Link */
        .link-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .link-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(0, 6, 255, 0.25);
        }
    </style>
</head>

<body class="bg-[#fafafa] text-kancah-dark selection:bg-kancah-blue selection:text-white overflow-x-hidden bg-tech-pattern bg-[length:24px_24px] min-h-screen flex flex-col items-center justify-center relative">

    <!-- Efek Ambient Light di Background -->
    <div class="fixed top-[-10%] left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-kancah-blue/10 rounded-full blur-[100px] pointer-events-none z-0 animate-float"></div>

    <!-- Container Utama (Lebih ramping ala Linktree) -->
    <div class="w-full max-w-[500px] px-6 py-16 relative z-10 flex flex-col items-center min-h-screen">

        <!-- ==========================================
             1. PROFILE HEADER
        =========================================== -->
        <div class="w-full text-center flex flex-col items-center animate-fade-up">
            <!-- Logo -->
            <div class="w-24 h-24 mb-6 bg-white rounded-full flex items-center justify-center shadow-lg border border-gray-100 p-4">
                <img src="./assets/kancah-logo.png" alt="Kancah Logo" class="w-full h-auto object-contain" onerror="this.src='https://via.placeholder.com/150?text=K'">
            </div>

            <!-- Title & Tagline -->
            <h1 class="text-2xl font-black tracking-tight uppercase text-kancah-dark">@kancahcom</h1>
            <p class="text-gray-500 text-sm mt-2 font-medium">Future Proof Creative Agency.</p>

            <!-- Social Media Icons -->
            <div class="flex items-center justify-center gap-5 mt-6 text-[22px]">
                <a href="https://www.instagram.com/kancahcom" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.linkedin.com/company/kancah/" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://wa.me/628924687866" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>

        <!-- Divider -->
        <div class="w-12 h-1 bg-kancah-blue/20 rounded-full my-10 animate-fade-up" style="animation-delay: 0.1s; opacity: 0;"></div>

        <!-- ==========================================
             2. BUTTON LINKS
        =========================================== -->
        <div id="links-container" class="w-full space-y-4 animate-fade-up" style="animation-delay: 0.2s; opacity: 0;">
            <!-- Loading State -->
            <div class="text-center text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                Memuat tautan... <i class="fa-solid fa-spinner fa-spin ml-2"></i>
            </div>
        </div>

        <!-- Spacer to push footer down if content is short -->
        <div class="flex-grow"></div>

        <!-- ==========================================
             3. FOOTER
        =========================================== -->
        <div class="mt-16 text-center animate-fade-up" style="animation-delay: 0.3s; opacity: 0;">
            <a href="/" class="flex items-center justify-center gap-2 group">
                <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest group-hover:text-kancah-blue transition-colors">Powered by Kancah</span>
                <i class="fa-solid fa-bolt text-gray-300 text-[10px] group-hover:text-kancah-blue transition-colors"></i>
            </a>
        </div>

    </div>

    <script>
        // Supabase Init
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // Fetch Links from DB
        async function loadLinks() {
            const container = document.getElementById('links-container');
            
            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 text-center">Belum ada tautan aktif.</p>';
                    return;
                }

                // Render tombol Links dengan style Typographic terpusat ala Linktree
                container.innerHTML = data.map(l => `
                    <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
                       class="link-card relative w-full flex items-center justify-center bg-white border border-gray-100 py-5 px-8 rounded-full hover:border-kancah-blue hover:bg-kancah-blue group overflow-hidden shadow-sm">
                        
                        <!-- Teks Utama -->
                        <span class="font-bold text-[11px] sm:text-xs uppercase tracking-[0.15em] text-kancah-dark group-hover:text-white relative z-10 transition-colors text-center w-full">
                            ${l.title}
                        </span>
                        
                        <!-- Ikon panah tersembunyi yang muncul saat di-hover -->
                        <i class="fa-solid fa-arrow-right -rotate-45 text-white absolute right-6 opacity-0 group-hover:opacity-100 group-hover:rotate-0 transition-all duration-300"></i>
                    </a>
                `).join('');
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-red-500 text-center">Gagal memuat tautan.</p>';
            }
        }

        // Track Click
        async function trackClick(id) {
            try {
                const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
                if(data) await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
            } catch (err) {}
        }

        // Init
        loadLinks();
    </script>
</body>
</html>
