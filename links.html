<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Ubuntu', sans-serif; 
            /* Gradient presisi 3 titik */
            background: linear-gradient(135deg, #0006ff 0%, #000000 40%, #000000 60%, #0006ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body class="text-white flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-[500px] flex flex-col items-center">
        
        <!-- Logo -->
        <div class="mb-8">
            <img src="./assets/kancah png.png" alt="Kancah Logo" class="h-24 w-auto object-contain drop-shadow-2xl">
        </div>

        <!-- Links Container -->
        <div id="links-container" class="w-full space-y-4">
            <div class="text-center text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">
                Memuat...
            </div>
        </div>
    </div>

    <script>
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        async function loadLinks() {
            const container = document.getElementById('links-container');
            const { data } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
            
            if (data) {
                container.innerHTML = data.map((l, index) => {
                    const num = String(index + 1).padStart(2, '0');
                    return `
                    <a href="${l.url}" target="_blank" 
                       class="group relative w-full flex items-center bg-white py-5 px-8 rounded-full hover:bg-kancah-blue transition-all duration-300 shadow-lg">
                        <!-- Nomor: Awal Biru, Hover Putih -->
                        <span class="absolute left-6 text-3xl font-black italic text-blue-700 group-hover:text-white transition-colors">
                            ${num}
                        </span>
                        <!-- Teks -->
                        <span class="font-bold text-[11px] uppercase tracking-[0.2em] text-black group-hover:text-white transition-colors text-center w-full mx-8">
                            ${l.title}
                        </span>
                        <!-- Panah -->
                        <div class="absolute right-3 w-10 h-10 rounded-full bg-blue-700 flex items-center justify-center group-hover:bg-white transition-all duration-300">
                            <i class="fa-solid fa-arrow-right -rotate-45 text-white group-hover:text-blue-700 transition-all duration-300 text-xs"></i>
                        </div>
                    </a>
                    `;
                }).join('');
            }
        }
        loadLinks();
    </script>
</body>
</html>
