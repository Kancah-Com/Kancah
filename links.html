<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Kancah Creative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] }, 
                    colors: { kancah: { blue: '#0006ff', dark: '#111111' } } 
                } 
            }
        }
    </script>
    <style>
        body { 
            background: #f4f4f5; 
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 6, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .link-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .link-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 6, 255, 0.1); border-color: #0006ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-16 px-4">

    <!-- Profile -->
    <div class="max-w-md w-full text-center mb-12">
        <img src="assets/kancah-logo.png" alt="Kancah Logo" class="w-16 h-16 mx-auto mb-6">
        <h1 class="text-xl font-black uppercase tracking-tighter text-kancah-dark">Kancah Creative</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-kancah-blue mt-1">Digital & Creative Agency</p>
    </div>

    <!-- Links Container -->
    <div id="links-container" class="max-w-md w-full flex flex-col gap-4">
        <!-- Data dimuat dari Supabase -->
        <div class="text-center text-xs text-gray-400">Loading links...</div>
    </div>

    <!-- Lead Form -->
    <div class="mt-12 bg-white p-8 rounded-[2rem] w-full max-w-md shadow-lg border border-gray-100">
        <h3 class="font-black uppercase tracking-widest text-[11px] mb-6 text-kancah-dark">Konsultasi Gratis</h3>
        <form id="leadForm" class="flex flex-col gap-3">
            <input type="text" id="nama" placeholder="Nama Kamu" class="p-4 rounded-2xl border border-gray-200 focus:border-kancah-blue outline-none text-sm" required>
            <input type="text" id="wa" placeholder="Nomor WhatsApp" class="p-4 rounded-2xl border border-gray-200 focus:border-kancah-blue outline-none text-sm" required>
            <button type="submit" id="btn-submit" class="bg-kancah-dark text-white p-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest hover:bg-kancah-blue transition-all">
                Kirim Pesan
            </button>
        </form>
    </div>

    <script>
        // --- KONFIGURASI ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- LOAD LINKS ---
        async function loadLinks() {
            const { data } = await supabase.from('links').select('*').order('sort_order', {ascending: true});
            const container = document.getElementById('links-container');
            container.innerHTML = data.map(l => `
                <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
                   class="link-card block bg-white border border-gray-200 py-4 px-6 rounded-full font-bold uppercase text-[11px] tracking-[0.2em] text-kancah-dark text-center">
                   ${l.title}
                </a>
            `).join('');
        }

        // --- TRACKING CLICK ---
        async function trackClick(id) {
            const { data } = await supabase.from('links').select('clicks').eq('id', id).single();
            await supabase.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
        }

        // --- LEAD FORM ---
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = 'Mengirim...';
            
            await supabase.from('leads').insert([{
                nama: document.getElementById('nama').value,
                whatsapp: document.getElementById('wa').value
            }]);
            
            alert('Pesan terkirim, tim Kancah segera hubungi!');
            document.getElementById('leadForm').reset();
            btn.innerText = 'Kirim Pesan';
        };

        loadLinks();
    </script>
</body>
</html>
