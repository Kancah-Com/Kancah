<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Konfigurasi Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { 
                        kancah: { 
                            blue: '#0006ff', 
                            dark: '#111111', 
                            gray: '#393939', 
                            light: '#f4f4f5' 
                        } 
                    },
                    backgroundImage: {
                        'tech-pattern': "radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0)"
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Ubuntu', sans-serif; 
            /* Gradient: 70% Hitam, 30% Biru memancar dari kanan atas seperti desain referensi */
            background: radial-gradient(circle at 85% 15%, #00048a 0%, #111111 40%, #111111 100%);
            background-attachment: fixed;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animasi masuk elemen */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        
        /* Delay Utilities */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>
</head>

<body class="text-white selection:bg-kancah-blue selection:text-white overflow-x-hidden relative min-h-screen flex flex-col items-center justify-center">

    <!-- ==========================================
         BACKGROUND PATTERN (Sangat tipis/elegan)
    =========================================== -->
    <div class="fixed inset-0 bg-tech-pattern bg-[length:30px_30px] z-0 pointer-events-none opacity-50"></div>

    <!-- ==========================================
         MAIN CONTENT CONTAINER
    =========================================== -->
    <div class="w-full max-w-[550px] px-6 py-12 relative z-10 flex flex-col items-center min-h-screen overflow-y-auto no-scrollbar">
        
        <!-- Tech Pill (Status) -->
        <div class="mb-8 opacity-0 animate-fade-up">
            <div class="flex items-center justify-center gap-3 bg-[#111111]/80 backdrop-blur-md border border-white/10 px-5 py-2 rounded-full shadow-sm">
                <div class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-kancah-blue opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-kancah-blue"></span>
                </div>
                <div class="flex gap-2 font-bold text-[10px] uppercase tracking-[0.2em] text-gray-300">
                    <span>Kancah HQ</span>
                    <span class="text-kancah-blue">|</span>
                    <span id="live-time">00:00</span>
                </div>
            </div>
        </div>

        <!-- Profile Area -->
        <div class="w-full text-center flex flex-col items-center opacity-0 animate-fade-up delay-100">
            <!-- Logo Tanpa Lingkaran Putih -->
            <div class="mb-5 flex justify-center">
                <img src="./assets/kancah png.png" alt="Kancah Logo" class="h-28 w-auto object-contain drop-shadow-2xl hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/150?text=KANCAH'">
            </div>

            <h1 class="text-3xl font-black tracking-tighter uppercase text-white leading-none drop-shadow-md">@kancahcom</h1>
            <p class="text-gray-400 text-[11px] uppercase tracking-[0.2em] mt-3 font-bold">Dream. Play. Create.</p>
        </div>

        <!-- Links Container -->
        <div id="links-container" class="w-full space-y-4 mt-10 opacity-0 animate-fade-up delay-200">
            <!-- Loading State -->
            <div class="text-center text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                Menghubungkan... <i class="fa-solid fa-circle-notch fa-spin ml-2"></i>
            </div>
        </div>

        <!-- Spacer -->
        <div class="flex-grow"></div>

        <!-- Social Media Floating Pill -->
        <div class="mt-12 mb-8 opacity-0 animate-fade-up delay-300">
            <div class="bg-[#111111]/80 backdrop-blur-xl border border-white/10 rounded-full px-8 py-4 flex items-center justify-center gap-8 text-2xl shadow-lg">
                <a href="https://www.instagram.com/kancahcom" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:scale-110 transition-all duration-300"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.linkedin.com/company/kancah/" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:scale-110 transition-all duration-300"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://wa.me/628924687866" target="_blank" class="text-gray-400 hover:text-kancah-blue hover:scale-110 transition-all duration-300"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="pb-4 text-center opacity-0 animate-fade-up delay-300">
            <a href="/" class="inline-flex items-center justify-center gap-2 group">
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest group-hover:text-white transition-colors">Creative Logic Systems</span>
            </a>
        </div>

    </div>

    <script>
        // Real-time Clock
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const el = document.getElementById('live-time');
            if(el) el.innerText = `${h}:${m} WIB`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Supabase Init
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // Fetch Links from DB
        async function loadLinks() {
            const container = document.getElementById('links-container');
            
            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 text-center">Belum ada tautan aktif.</p>';
                    return;
                }

                // Render tombol Links: Putih Solid, Teks Hitam, Hover Biru
                container.innerHTML = data.map((l, index) => {
                    const num = String(index + 1).padStart(2, '0');
                    return `
                    <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
                       class="group relative w-full flex items-center bg-white border border-transparent py-5 px-8 rounded-full hover:bg-kancah-blue transition-all duration-500 overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.15)] hover:shadow-[0_15px_30px_rgba(0,6,255,0.4)] hover:-translate-y-1">
                        
                        <!-- Ghost Number -->
                        <span class="absolute left-6 text-3xl font-black italic text-gray-100 group-hover:text-white/20 transition-colors pointer-events-none select-none">
                            ${num}
                        </span>
                        
                        <!-- Teks Utama -->
                        <span class="font-bold text-[11px] sm:text-xs uppercase tracking-[0.15em] text-kancah-dark group-hover:text-white relative z-10 transition-colors text-center w-full mx-8 line-clamp-1">
                            ${l.title}
                        </span>
                        
                        <!-- Arrow Icon Circle -->
                        <div class="absolute right-3 w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center group-hover:bg-white group-hover:scale-95 transition-all duration-300">
                            <i class="fa-solid fa-arrow-right -rotate-45 text-kancah-dark group-hover:text-kancah-blue group-hover:rotate-0 transition-all duration-300 text-xs"></i>
                        </div>
                    </a>
                `}).join('');
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-red-500 text-center">Gagal memuat tautan.</p>';
            }
        }

        // Track Click
        async function trackClick(id) {
            try {
                const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
                if(data) await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
            } catch (err) {}
        }

        // Init
        loadLinks();
    </script>
</body>
</html>
