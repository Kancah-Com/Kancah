<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <meta name="description" content="Semua akses cepat ke Kancah Creative — sosial media, layanan, dan kontak, dalam satu halaman.">
    <link rel="icon" type="image/png" href="./assets/logowh.png">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: {
                        kancah: { blue: '#0006ff', dark: '#111111', gray: '#393939', light: '#f4f4f5' }
                    },
                    backgroundImage: {
                        'tech-pattern': "radial-gradient(circle at 2px 2px, rgba(0, 6, 255, 0.06) 1px, transparent 0)"
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Ubuntu', sans-serif; background-color: #ffffff; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .delay-100 { animation-delay: .06s; }
        .delay-200 { animation-delay: .12s; }
        .delay-300 { animation-delay: .18s; }
        .delay-400 { animation-delay: .24s; }

        @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

        .glow-blob { position: absolute; border-radius: 9999px; filter: blur(110px); pointer-events: none; }
    </style>
</head>

<body class="text-kancah-dark selection:bg-kancah-blue selection:text-white overflow-x-hidden bg-tech-pattern bg-[length:24px_24px] relative min-h-screen flex flex-col items-center">

    <div class="glow-blob w-[420px] h-[420px] bg-kancah-blue/10 -top-32 -right-24"></div>
    <div class="glow-blob w-[320px] h-[320px] bg-kancah-blue/5 top-[70vh] -left-28"></div>

    <div class="w-full max-w-[440px] px-5 pt-12 pb-8 relative z-10 flex flex-col items-center">

        <!-- ==========================================
             PROFILE — avatar, nama, bio
        =========================================== -->
        <div class="flex flex-col items-center text-center opacity-0 animate-fade-up">
            <div class="w-24 h-24 rounded-full bg-kancah-dark ring-4 ring-white shadow-xl flex items-center justify-center overflow-hidden mb-4">
                <img src="assets/logowh.png" alt="Kancah Creative" class="h-9 w-auto object-contain" onerror="this.parentElement.innerHTML='<span class=\'text-white font-black text-2xl\'>K</span>'">
            </div>

            <h1 class="font-black text-lg uppercase tracking-tight">Kancah Creative</h1>

            <a href="https://www.instagram.com/kancahcom" target="_blank" rel="noopener" class="text-kancah-blue font-bold text-xs mt-1 hover:underline">@kancahcom</a>

            <p class="text-gray-500 text-xs sm:text-sm font-light leading-relaxed mt-3 max-w-[320px]">
                Digital &amp; creative agency. Semua akses ke sosial media, layanan, dan kontak kami, dalam satu halaman.
            </p>
        </div>

        <!-- ==========================================
             FEATURED LINK — satu CTA yang disorot
        =========================================== -->
        <div class="w-full mt-7 opacity-0 animate-fade-up delay-100">
            <a href="https://kancah.com/contact" target="_blank" rel="noopener"
               class="w-full flex items-center justify-center gap-2 bg-kancah-blue hover:bg-kancah-dark text-white font-black uppercase tracking-wide text-sm rounded-full py-4 px-6 transition-all duration-300 hover:-translate-y-0.5 shadow-lg shadow-kancah-blue/20">
                <i class="fa-regular fa-comments text-sm"></i>
                <span>Jadwalkan Konsultasi Gratis</span>
            </a>
        </div>

        <!-- ==========================================
             LINKS — daftar tautan dari Supabase
        =========================================== -->
        <div class="w-full mt-3 space-y-3" id="links-container">
            <div class="text-center py-6 text-gray-400 font-bold uppercase tracking-[0.2em] text-[10px]">
                Menghubungkan <i class="fa-solid fa-circle-notch fa-spin ml-2"></i>
            </div>
        </div>

        <!-- ==========================================
             SOCIAL ICONS
        =========================================== -->
        <div class="flex items-center justify-center gap-5 mt-8 opacity-0 animate-fade-up delay-400">
            <a href="https://www.instagram.com/kancahcom" target="_blank" rel="noopener" aria-label="Instagram Kancah" class="w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-kancah-dark hover:bg-kancah-blue hover:text-white hover:border-kancah-blue transition-all duration-300"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.linkedin.com/company/kancah/" target="_blank" rel="noopener" aria-label="LinkedIn Kancah" class="w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-kancah-dark hover:bg-kancah-blue hover:text-white hover:border-kancah-blue transition-all duration-300"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://wa.me/6289524687866" target="_blank" rel="noopener" aria-label="WhatsApp Kancah" class="w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-kancah-dark hover:bg-kancah-blue hover:text-white hover:border-kancah-blue transition-all duration-300"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="mailto:kancahcreative@gmail.com" aria-label="Email Kancah" class="w-10 h-10 rounded-full flex items-center justify-center border border-gray-200 text-kancah-dark hover:bg-kancah-blue hover:text-white hover:border-kancah-blue transition-all duration-300"><i class="fa-regular fa-envelope"></i></a>
        </div>

        <!-- Footer -->
        <div class="mt-8 flex flex-col items-center gap-1.5 opacity-0 animate-fade-up delay-400">
            <span class="text-[9px] font-bold text-gray-300 uppercase tracking-widest text-center">Jalan Anggajaya 2, Condongcatur, Sleman, Yogyakarta 55281</span>
            <a href="https://kancah.com" target="_blank" rel="noopener" class="text-[9px] font-bold text-gray-400 hover:text-kancah-blue uppercase tracking-widest transition-colors">&copy; 2026 PT. Kancah Media Sejahtera</a>
        </div>

    </div>

    <script>
        // ── Supabase Init ──
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // ── Deteksi ikon otomatis dari URL ──
        function getLinkIcon(url = '') {
            const u = url.toLowerCase();
            if (u.includes('instagram.com')) return 'fa-brands fa-instagram';
            if (u.includes('wa.me') || u.includes('whatsapp')) return 'fa-brands fa-whatsapp';
            if (u.includes('linkedin.com')) return 'fa-brands fa-linkedin';
            if (u.includes('tiktok.com')) return 'fa-brands fa-tiktok';
            if (u.includes('youtube.com') || u.includes('youtu.be')) return 'fa-brands fa-youtube';
            if (u.includes('behance.net')) return 'fa-brands fa-behance';
            if (u.includes('mailto:')) return 'fa-regular fa-envelope';
            if (u.includes('maps.google') || u.includes('goo.gl/maps')) return 'fa-solid fa-location-dot';
            if (u.includes('works') || u.includes('portfolio')) return 'fa-solid fa-briefcase';
            if (u.includes('pricelist') || u.includes('price')) return 'fa-solid fa-tags';
            if (u.includes('contact')) return 'fa-regular fa-comments';
            return 'fa-solid fa-link';
        }

        // ── Render Links dari Supabase (gaya tombol standar shortlink) ──
        async function loadLinks() {
            const container = document.getElementById('links-container');

            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', { ascending: true });
                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-center text-[10px] font-bold uppercase tracking-widest text-gray-400 py-6">Belum ada tautan aktif.</p>';
                    return;
                }

                container.innerHTML = data.map((l, index) => {
                    const icon = getLinkIcon(l.url);
                    const delay = (index * 0.06).toFixed(2);
                    return `
                    <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" rel="noopener"
                       style="opacity:0; transform:translateY(12px); animation: cardIn 0.5s cubic-bezier(.23,1,.32,1) ${delay}s forwards;"
                       class="w-full flex items-center justify-center gap-2 bg-kancah-dark hover:bg-kancah-blue text-white font-bold uppercase tracking-wide text-sm rounded-full py-4 px-6 transition-all duration-300 hover:-translate-y-0.5 shadow-sm">
                        <i class="${icon} text-sm"></i>
                        <span>${l.title}</span>
                    </a>
                `}).join('');
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<p class="text-center text-[10px] font-bold uppercase tracking-widest text-red-500 py-6">Gagal memuat tautan.</p>';
            }
        }

        async function trackClick(id) {
            try {
                const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
                if (data) await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
            } catch (err) {}
        }

        loadLinks();
    </script>
</body>
</html>
