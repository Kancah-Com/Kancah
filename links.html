<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Kancah Creative</title>
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { 
                        kancah: { 
                            blue: '#0025D4',
                            darkblue: '#050B3D'
                        } 
                    },
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Hilangkan scrollbar bawaan */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Delay untuk animasi blob */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* Animasi hover tombol */
        .link-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 15px 30px -5px rgba(0, 37, 212, 0.2); }
        
        /* Custom Checkbox Form */
        input[type="checkbox"]:checked + div {
            border-color: #0025D4;
            background-color: rgba(0, 37, 212, 0.05);
        }
        input[type="checkbox"]:checked + div i { opacity: 1; }
    </style>
</head>

<body class="text-kancah-darkblue min-h-screen flex justify-center pb-20 relative overflow-x-hidden">

    <!-- ================= DYNAMIC BACKGROUND ================= -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <!-- Tech Grid Overlay -->
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#0025D410_1px,transparent_1px),linear-gradient(to_bottom,#0025D410_1px,transparent_1px)] bg-[size:24px_24px]"></div>
        
        <!-- Glowing Animated Orbs -->
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-blue-400/30 mix-blend-multiply filter blur-[100px] animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[400px] h-[400px] rounded-full bg-indigo-300/30 mix-blend-multiply filter blur-[100px] animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[600px] h-[600px] rounded-full bg-blue-600/20 mix-blend-multiply filter blur-[120px] animate-blob animation-delay-4000"></div>
    </div>
    <!-- ====================================================== -->

    <div class="w-full max-w-[600px] px-4 pt-16 relative z-10">

        <div class="flex flex-col items-center text-center mb-10">
            <!-- Logo Kancah -->
            <div class="mb-4 flex justify-center">
                <img src="./assets/kancah-logo.png" alt="Kancah Logo" class="w-40 h-auto object-contain drop-shadow-md hover:scale-105 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/150?text=KANCAH'">
            </div>
            
            <!-- Tagline -->
            <p class="text-[15px] font-bold tracking-widest uppercase text-kancah-blue/80 mt-2">Dream. Play. Create.</p>

            <!-- Social Media Icons -->
            <div class="flex items-center gap-6 mt-6 text-[28px]">
                <a href="https://www.instagram.com/kancahcom" target="_blank" class="text-kancah-blue hover:scale-110 hover:text-kancah-darkblue transition-all drop-shadow-sm"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.linkedin.com/company/kancah/" target="_blank" class="text-kancah-blue hover:scale-110 hover:text-kancah-darkblue transition-all drop-shadow-sm"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://wa.me/628924687866" target="_blank" class="text-kancah-blue hover:scale-110 hover:text-kancah-darkblue transition-all drop-shadow-sm"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>

        <div id="links-container" class="space-y-4 mb-16">
            <!-- Loading State -->
            <div class="text-center text-sm font-semibold animate-pulse opacity-70">
                Memuat tautan...
            </div>
        </div>

        <!-- Form Penawaran -->
        <div class="bg-white/70 backdrop-blur-xl rounded-[2rem] shadow-[0_8px_30px_rgb(0,37,212,0.08)] overflow-hidden border border-white/80">
            <div class="p-8 text-center border-b border-gray-200/50">
                <h2 class="text-xl font-bold">Kirim Penawaran</h2>
                <p class="text-sm font-medium opacity-80 mt-1">Isi detail untuk diskusi proyek dengan Kancah</p>
            </div>

            <form id="leadForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <input type="text" id="nama" class="w-full p-4 bg-white/80 text-gray-800 rounded-2xl border border-gray-200/60 outline-none focus:border-kancah-blue focus:ring-4 focus:ring-kancah-blue/10 transition-all font-medium text-sm placeholder-gray-400" placeholder="Nama Lengkap" required>
                    </div>
                    <div>
                        <input type="text" id="instansi" class="w-full p-4 bg-white/80 text-gray-800 rounded-2xl border border-gray-200/60 outline-none focus:border-kancah-blue focus:ring-4 focus:ring-kancah-blue/10 transition-all font-medium text-sm placeholder-gray-400" placeholder="Instansi / Brand">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <input type="email" id="email" class="w-full p-4 bg-white/80 text-gray-800 rounded-2xl border border-gray-200/60 outline-none focus:border-kancah-blue focus:ring-4 focus:ring-kancah-blue/10 transition-all font-medium text-sm placeholder-gray-400" placeholder="Alamat Email" required>
                    </div>
                    <div>
                        <input type="tel" id="wa" class="w-full p-4 bg-white/80 text-gray-800 rounded-2xl border border-gray-200/60 outline-none focus:border-kancah-blue focus:ring-4 focus:ring-kancah-blue/10 transition-all font-medium text-sm placeholder-gray-400" placeholder="No. WhatsApp" required>
                    </div>
                </div>

                <!-- Checkbox Layanan -->
                <div>
                    <label class="block text-xs font-bold mb-2 opacity-80">Layanan yang dibutuhkan:</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="relative cursor-pointer text-gray-700">
                            <input type="checkbox" name="services" value="Brand Design" class="peer sr-only">
                            <div class="p-3 border border-gray-200/60 bg-white/80 rounded-xl transition-all flex items-center justify-between shadow-sm">
                                <span class="text-[12px] font-semibold">Brand Design</span>
                                <i class="fa-solid fa-circle-check text-kancah-blue opacity-0 transition-opacity"></i>
                            </div>
                        </label>
                        <label class="relative cursor-pointer text-gray-700">
                            <input type="checkbox" name="services" value="Promotion" class="peer sr-only">
                            <div class="p-3 border border-gray-200/60 bg-white/80 rounded-xl transition-all flex items-center justify-between shadow-sm">
                                <span class="text-[12px] font-semibold">Promotion</span>
                                <i class="fa-solid fa-circle-check text-kancah-blue opacity-0 transition-opacity"></i>
                            </div>
                        </label>
                        <label class="relative cursor-pointer text-gray-700">
                            <input type="checkbox" name="services" value="Tech Dev" class="peer sr-only">
                            <div class="p-3 border border-gray-200/60 bg-white/80 rounded-xl transition-all flex items-center justify-between shadow-sm">
                                <span class="text-[12px] font-semibold">Tech Dev</span>
                                <i class="fa-solid fa-circle-check text-kancah-blue opacity-0 transition-opacity"></i>
                            </div>
                        </label>
                        <label class="relative cursor-pointer text-gray-700">
                            <input type="checkbox" name="services" value="Audio Visual" class="peer sr-only">
                            <div class="p-3 border border-gray-200/60 bg-white/80 rounded-xl transition-all flex items-center justify-between shadow-sm">
                                <span class="text-[12px] font-semibold">Audio Visual</span>
                                <i class="fa-solid fa-circle-check text-kancah-blue opacity-0 transition-opacity"></i>
                            </div>
                        </label>
                    </div>
                </div>

                <div>
                    <textarea id="pesan" rows="3" class="w-full p-4 bg-white/80 text-gray-800 rounded-2xl border border-gray-200/60 outline-none focus:border-kancah-blue focus:ring-4 focus:ring-kancah-blue/10 transition-all font-medium text-sm placeholder-gray-400 resize-none shadow-inner" placeholder="Ceritakan singkat kebutuhan Anda..."></textarea>
                </div>
                
                <button type="submit" id="btn-submit" class="w-full bg-kancah-blue text-white p-4 rounded-full font-bold text-sm hover:bg-kancah-darkblue transition-colors active:scale-[0.98] shadow-[0_8px_20px_rgb(0,37,212,0.3)] mt-2">
                    Kirim Permintaan
                </button>
            </form>
        </div>

    </div>

    <script>
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        async function loadLinks() {
            const container = document.getElementById('links-container');
            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = '<p class="text-sm font-semibold opacity-70 text-center">Belum ada tautan aktif.</p>';
                    return;
                }

                // Render tombol dengan efek glassmorphism yang lebih pop-up
                container.innerHTML = data.map(l => `
                    <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
                       class="link-btn relative w-full flex items-center justify-center bg-white/80 backdrop-blur-md border border-white/60 py-[20px] px-6 rounded-full shadow-[0_4px_20px_rgb(0,37,212,0.06)] transition-all">
                        <span class="font-bold text-[15px] text-kancah-blue">${l.title}</span>
                    </a>
                `).join('');
            } catch (err) {
                console.error("Error:", err);
                container.innerHTML = '<p class="text-sm font-semibold text-red-500 text-center">Gagal memuat tautan.</p>';
            }
        }

        async function trackClick(id) {
            try {
                const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
                if(data) await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
            } catch (err) {}
        }

        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerText;
            
            btn.innerHTML = 'MENGIRIM... <i class="fa-solid fa-spinner fa-spin ml-2"></i>';
            btn.disabled = true;

            const services = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(c => c.value).join(', ');

            try {
                const { error } = await kancah.from('leads').insert([{
                    nama: document.getElementById('nama').value,
                    email: document.getElementById('email').value,
                    whatsapp: document.getElementById('wa').value,
                    instansi: document.getElementById('instansi').value,
                    services: services,
                    pesan: document.getElementById('pesan').value
                }]);

                if (error) throw error;
                alert('Pesan terkirim! Tim Kancah Creative akan segera menghubungi Anda.');
                e.target.reset(); 
            } catch (err) {
                alert('Terjadi kesalahan. Coba hubungi via WhatsApp.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        loadLinks();
    </script>
</body>
</html>
