<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <meta name="description" content="Semua link dan kanal resmi Kancah Creative — website, WhatsApp, portofolio, dan sosial media, ada di satu tempat.">
    <link rel="canonical" href="https://kancah.com/links" />
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { kancah: { blue: '#0006ff', dark: '#111111', gray: '#393939', light: '#f4f4f5' } },
                    screens: { 'xs': '475px' }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: 'Ubuntu', sans-serif; }

        /* Footer marquee */
        .footer-marquee-content { display: flex; width: max-content; animation: footer-marquee 20s linear infinite; }
        @keyframes footer-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Mobile menu */
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-open { overflow: hidden; }

        /* Hero fade up */
        .fade-up { animation: fadeUp 0.7s ease-out forwards; opacity: 0; transform: translateY(16px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* Link card staggered reveal */
        .link-card-in { opacity: 0; transform: translateY(16px); animation: linkIn 0.5s cubic-bezier(.23,1,.32,1) forwards; }
        @keyframes linkIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="bg-white text-kancah-dark selection:bg-kancah-blue selection:text-white overflow-x-hidden">

  

    <div id="mobile-menu" class="fixed inset-0 bg-white z-[150] flex flex-col justify-center items-center gap-8 translate-x-full transition-transform duration-500 lg:hidden">
        <button class="absolute top-6 right-6 text-3xl" id="close-menu">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="flex flex-col items-center gap-8 text-2xl font-black uppercase tracking-widest text-kancah-dark">
            <a href="about" class="mobile-link hover:text-kancah-blue transition-colors">Agency</a>
            <a href="services" class="mobile-link hover:text-kancah-blue transition-colors">Capabilities</a>
            <a href="works" class="mobile-link hover:text-kancah-blue transition-colors">Work</a>
            <a href="pricelist" class="mobile-link hover:text-kancah-blue transition-colors">Pricelist</a>
            <a href="careers" class="mobile-link hover:text-kancah-blue transition-colors">Careers</a>
            <a href="contact" class="mobile-link px-8 py-3 bg-kancah-blue text-white rounded-full text-sm">Talk to us</a>
        </div>
    </div>

    <!-- ═══════════════ MAIN — SHORTLINK HUB ═══════════════ -->
    <main class="pt-28 sm:pt-36 pb-20 px-4 sm:px-6 md:min-h-[85vh] md:flex md:flex-col md:justify-center">
        <div class="max-w-[600px] mx-auto w-full">

            <!-- Identity / bio -->
            <div class="flex flex-col items-center text-center mb-10 sm:mb-14 fade-up">
                <div class="relative mb-6">
                    <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full overflow-hidden shadow-xl shadow-kancah-blue/20">
                        <img src="assets/logowh.png" alt="Kancah Creative" class="w-full h-full object-cover">
                    </div>
                    <span class="absolute bottom-1 right-1 flex h-4 w-4">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-kancah-blue opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-4 w-4 bg-kancah-blue border-2 border-white"></span>
                    </span>
                </div>

                <span class="text-kancah-blue font-bold text-[10px] sm:text-xs uppercase tracking-[0.35em] mb-3 block">Digital & Creative Agency</span>
                <h1 class="text-3xl sm:text-4xl font-black uppercase tracking-tighter mb-3">Kancah <span class="text-kancah-blue italic">Creative</span></h1>
                <p class="text-gray-500 text-sm sm:text-base font-light leading-relaxed max-w-sm">           We help brands communicate better, grow faster, and create lasting impressions through design, technology, and creativity.
</p>

                <div class="flex items-center gap-3 mt-6">
                    <a href="https://wa.me/6289524687866" target="_blank" rel="noopener" aria-label="WhatsApp" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:border-kancah-blue hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                    <a href="mailto:kancahcreative@gmail.com" aria-label="Email" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:border-kancah-blue hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300">
                        <i class="fa-regular fa-envelope"></i>
                    </a>
                    <a href="#" target="_blank" rel="noopener" aria-label="Instagram" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:border-kancah-blue hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="#" target="_blank" rel="noopener" aria-label="LinkedIn" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:border-kancah-blue hover:text-kancah-blue hover:-translate-y-1 transition-all duration-300">
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                </div>
            </div>

            <!-- Links list (loaded from Supabase) -->
            <div id="links-container" class="space-y-3 sm:space-y-4">
                <div class="flex flex-col items-center justify-center gap-3 py-16 text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-kancah-blue text-2xl"></i>
                    <span class="text-[10px] font-black uppercase tracking-[0.3em]">Memuat link...</span>
                </div>
            </div>

        </div>
    </main>

    <!-- ═══════════════ FOOTER (matches contact.html) ═══════════════ -->
  

    <script>
        const kancah = supabase.createClient('https://hmzwjceomnneiczbpban.supabase.co', 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__');

        async function loadLinks() {
            const container = document.getElementById('links-container');
            try {
                const { data, error } = await kancah.from('links').select('*').order('sort_order', { ascending: true });
                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-16 text-gray-400">
                            <i class="fa-regular fa-face-frown text-2xl mb-3 block"></i>
                            <span class="text-[10px] font-black uppercase tracking-[0.3em]">Belum ada link tersedia</span>
                        </div>`;
                    return;
                }

                container.innerHTML = data.map((l, i) => `
                    <a href="${l.url}" target="_blank" rel="noopener"
                       class="link-card-in group relative flex items-center justify-between gap-4 bg-kancah-blue rounded-2xl py-4 sm:py-5 px-5 sm:px-6 overflow-hidden transition-all duration-300 hover:-translate-y-1 active:scale-[0.98] hover:shadow-xl hover:shadow-black/30"
                       style="animation-delay:${(i * 0.08).toFixed(2)}s">
                        <span class="relative z-10 flex items-center gap-3 min-w-0">
                            ${l.icon ? `<i class="${l.icon} text-white text-lg w-5 text-center flex-shrink-0"></i>` : ''}
                            <span class="font-bold uppercase tracking-[0.12em] text-sm sm:text-base text-white truncate">${l.title}</span>
                        </span>
                        <i class="fa-solid fa-arrow-right -rotate-45 group-hover:rotate-0 text-white relative z-10 flex-shrink-0"></i>
                        <div class="absolute inset-0 bg-kancah-dark translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </a>
                `).join('');
            } catch (err) {
                console.error('Links load error:', err);
                container.innerHTML = `
                    <div class="text-center py-16 text-gray-400">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-3 block"></i>
                        <span class="text-[10px] font-black uppercase tracking-[0.3em]">Gagal memuat link</span>
                    </div>`;
            }
        }
        loadLinks();

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-7.7956&longitude=110.3695&current_weather=true');
                const data = await res.json();
                if (data?.current_weather) {
                    const t = Math.round(data.current_weather.temperature) + "°C";
                    if (document.getElementById('nav-temp')) document.getElementById('nav-temp').innerText = t;
                    if (document.getElementById('nav-temp-mobile')) document.getElementById('nav-temp-mobile').innerText = t;
                }
            } catch (e) {}
        }

        function updateClock() {
            const n = new Date();
            const h = String(n.getHours()).padStart(2, '0'), m = String(n.getMinutes()).padStart(2, '0'), s = String(n.getSeconds()).padStart(2, '0');
            if (document.getElementById('nav-time')) document.getElementById('nav-time').innerText = `${h}:${m}:${s}`;
            if (document.getElementById('nav-time-mobile')) document.getElementById('nav-time-mobile').innerText = `${h}:${m}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateWeather(); updateClock(); setInterval(updateClock, 1000);

            const trigger = document.getElementById('weather-mobile-trigger');
            const popup = document.getElementById('location-popup');

            if (trigger && popup) {
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = popup.classList.contains('opacity-100');
                    if (isOpen) {
                        popup.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                        popup.classList.remove('opacity-100', 'scale-100');
                    } else {
                        popup.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
                        popup.classList.add('opacity-100', 'scale-100');
                        setTimeout(() => {
                            popup.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                            popup.classList.remove('opacity-100', 'scale-100');
                        }, 3000);
                    }
                });
                document.addEventListener('click', () => {
                    popup.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                    popup.classList.remove('opacity-100', 'scale-100');
                });
            }

            const btn = document.getElementById('mobile-menu-button'),
                  menu = document.getElementById('mobile-menu'),
                  close = document.getElementById('close-menu'),
                  body = document.body;

            const openMenu = () => {
                menu.classList.replace('translate-x-full', 'translate-x-0');
                body.style.overflow = 'hidden';
            };
            const closeMenu = () => {
                menu.classList.replace('translate-x-0', 'translate-x-full');
                body.style.overflow = '';
            };

            if (btn) btn.onclick = (e) => { e.stopPropagation(); openMenu(); };
            if (close) close.onclick = (e) => { e.stopPropagation(); closeMenu(); };
            document.querySelectorAll('.mobile-link').forEach(l => l.onclick = () => closeMenu());
        });
    </script>
</body>
</html>
