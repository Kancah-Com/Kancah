<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kancah Creative | Hubungkan Visi Anda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="py-12 px-4 flex flex-col items-center">

    <!-- Profile Section -->
    <div class="max-w-md w-full text-center mb-10">
        <div class="w-24 h-24 bg-black rounded-full mx-auto mb-4 flex items-center justify-center text-white font-black text-2xl shadow-xl">K</div>
        <h1 class="text-2xl font-black uppercase tracking-tighter text-slate-900">Kancah Creative</h1>
        <p class="text-[11px] font-bold uppercase tracking-[0.3em] text-[#0006ff] mt-1">Digital & Creative Agency</p>
    </div>

    <!-- Links Section -->
    <div id="links-container" class="max-w-md w-full space-y-4 mb-16">
        <!-- Links dimuat otomatis -->
    </div>

    <!-- Form Penawaran -->
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-[#0006ff] p-8">
            <h2 class="text-white text-xl font-black uppercase tracking-tight">Kirim Penawaran</h2>
            <p class="text-blue-100 text-[11px] font-medium mt-1">Isi form di bawah ini untuk mendapatkan penawaran lebih lanjut</p>
        </div>
        <form id="leadForm" class="p-8 space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nama *</label>
                <input type="text" id="nama" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-[#0006ff] outline-none text-sm transition-all" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Email *</label>
                    <input type="email" id="email" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-[#0006ff] outline-none text-sm" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">WhatsApp *</label>
                    <input type="tel" id="wa" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-[#0006ff] outline-none text-sm" required>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nama Instansi *</label>
                <input type="text" id="instansi" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-[#0006ff] outline-none text-sm" required>
            </div>
            
            <!-- Checkbox Services -->
            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Pilih Layanan</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center gap-2 text-[12px] font-medium"><input type="checkbox" name="services" value="Website" class="accent-[#0006ff]"> Website</label>
                    <label class="flex items-center gap-2 text-[12px] font-medium"><input type="checkbox" name="services" value="Digital Marketing" class="accent-[#0006ff]"> Dig-Marketing</label>
                    <label class="flex items-center gap-2 text-[12px] font-medium"><input type="checkbox" name="services" value="Design" class="accent-[#0006ff]"> Design</label>
                    <label class="flex items-center gap-2 text-[12px] font-medium"><input type="checkbox" name="services" value="Production" class="accent-[#0006ff]"> Production</label>
                </div>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold uppercase text-[12px] tracking-widest hover:bg-[#0006ff] transition-all transform active:scale-95">
                Minta Penawaran
            </button>
        </form>
    </div>

   <script>
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // Logic kirim lead ke database
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const services = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(c => c.value).join(', ');
            
            await kancah.from('leads').insert([{
                nama: document.getElementById('nama').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('wa').value,
                instansi: document.getElementById('instansi').value,
                services: services
            }]);
            
            alert('Penawaran terkirim! Tim Kancah akan segera menghubungi.');
            e.target.reset();
        };
    async function loadLinks() {
        // Ganti 'supabase' menjadi 'kancah'
        const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
        
        if (error) {
            console.error("Error loading links:", error);
            return;
        }

        const container = document.getElementById('links-container');
        container.innerHTML = data.map(l => `
            <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
               class="block bg-white border border-slate-100 py-4 px-6 rounded-full font-bold uppercase text-[11px] tracking-[0.2em] text-slate-900 text-center hover:bg-[#0006ff] hover:text-white transition-all shadow-sm">
               ${l.title}
            </a>
        `).join('');
    }

    async function trackClick(id) {
        // Ganti 'supabase' menjadi 'kancah'
        const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
        await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
    }

    document.getElementById('leadForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = 'MENGIRIM...';
        
        // Ganti 'supabase' menjadi 'kancah'
        await kancah.from('leads').insert([{
            nama: document.getElementById('nama').value,
            whatsapp: document.getElementById('wa').value
        }]);
        
        alert('Pesan terkirim, tim Kancah segera hubungi!');
        document.getElementById('leadForm').reset();
        btn.innerText = 'KIRIM PESAN';
    };

    loadLinks();
</script>
</body>
</html>
