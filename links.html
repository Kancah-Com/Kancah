<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Kancah Creative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen py-16 px-4">

    <div class="max-w-md w-full text-center mb-12">
        <img src="../assets/kancah-logo.png" class="w-16 mx-auto mb-6">
        <h1 class="text-xl font-black uppercase tracking-tighter">Kancah Creative</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-[#0006ff] mt-1">Digital & Creative Agency</p>
    </div>

    <div id="links-container" class="max-w-md w-full flex flex-col gap-3">
        <!-- Links akan dimuat via JS -->
    </div>

    <!-- Form Konsultasi -->
    <div class="mt-12 bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-sm border border-slate-100">
        <h3 class="font-black uppercase tracking-widest text-[11px] mb-6 text-slate-900">Konsultasi Gratis</h3>
        <form id="leadForm" class="flex flex-col gap-3">
            <input type="text" id="nama" placeholder="Nama Kamu" class="p-4 rounded-2xl border border-slate-100 focus:border-[#0006ff] outline-none text-sm w-full" required>
            <input type="text" id="wa" placeholder="Nomor WhatsApp" class="p-4 rounded-2xl border border-slate-100 focus:border-[#0006ff] outline-none text-sm w-full" required>
            <button type="submit" id="btn-submit" class="bg-[#0006ff] text-white p-4 rounded-2xl font-bold uppercase text-[11px] tracking-widest hover:bg-black transition-all">
                Kirim Pesan
            </button>
        </form>
    </div>

    <script>
    const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
    const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
    // Gunakan 'kancah' sebagai nama variabel agar konsisten
    const kancah = supabase.createClient(kancahUrl, kancahKey);

    async function loadLinks() {
        // Ganti 'supabase' menjadi 'kancah'
        const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
        
        if (error) {
            console.error("Error loading links:", error);
            return;
        }

        const container = document.getElementById('links-container');
        container.innerHTML = data.map(l => `
            <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
               class="block bg-white border border-slate-100 py-4 px-6 rounded-full font-bold uppercase text-[11px] tracking-[0.2em] text-slate-900 text-center hover:bg-[#0006ff] hover:text-white transition-all shadow-sm">
               ${l.title}
            </a>
        `).join('');
    }

    async function trackClick(id) {
        // Ganti 'supabase' menjadi 'kancah'
        const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
        await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
    }

    document.getElementById('leadForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = 'MENGIRIM...';
        
        // Ganti 'supabase' menjadi 'kancah'
        await kancah.from('leads').insert([{
            nama: document.getElementById('nama').value,
            whatsapp: document.getElementById('wa').value
        }]);
        
        alert('Pesan terkirim, tim Kancah segera hubungi!');
        document.getElementById('leadForm').reset();
        btn.innerText = 'KIRIM PESAN';
    };

    loadLinks();
</script>
</body>
</html>
