<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kancah Creative | Hubungkan Visi Anda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Ubuntu', 'sans-serif'] },
                    colors: { kancah: { blue: '#0006ff', dark: '#111111' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #111111; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="py-16 px-4 flex flex-col items-center font-sans">

    <div class="max-w-md w-full text-center mb-12">
        <div class="w-24 h-24 bg-kancah-dark rounded-full mx-auto mb-6 flex items-center justify-center text-white font-black text-3xl">K</div>
        <h1 class="text-3xl font-black uppercase tracking-tighter">Kancah Creative</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-kancah-blue mt-2">Digital & Creative Agency</p>
    </div>

    <div id="links-container" class="max-w-md w-full space-y-3 mb-16">
        </div>

    <div class="max-w-md w-full bg-slate-50 rounded-[2rem] border border-slate-100 overflow-hidden shadow-xl">
        <div class="p-8 border-b border-slate-200">
            <h2 class="text-lg font-black uppercase tracking-tight">Kirim Penawaran</h2>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Isi detail untuk diskusi proyek</p>
        </div>
        <form id="leadForm" class="p-8 space-y-4">
            <div>
                <label class="block text-[9px] font-black text-slate-400 uppercase mb-1">Nama</label>
                <input type="text" id="nama" class="w-full p-4 bg-white rounded-2xl border border-slate-200 focus:border-kancah-blue outline-none transition-all" required>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase mb-1">Email</label>
                    <input type="email" id="email" class="w-full p-4 bg-white rounded-2xl border border-slate-200 focus:border-kancah-blue outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase mb-1">WhatsApp</label>
                    <input type="tel" id="wa" class="w-full p-4 bg-white rounded-2xl border border-slate-200 focus:border-kancah-blue outline-none transition-all" required>
                </div>
            </div>
            
            <button type="submit" id="btn-submit" class="w-full bg-kancah-dark text-white p-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] hover:bg-kancah-blue transition-all active:scale-[0.98]">
                Kirim Permintaan
            </button>
        </form>
    </div>
   <script>
        const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);

        // Logic kirim lead ke database
        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const services = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(c => c.value).join(', ');
            
            await kancah.from('leads').insert([{
                nama: document.getElementById('nama').value,
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('wa').value,
                instansi: document.getElementById('instansi').value,
                services: services
            }]);
            
            alert('Penawaran terkirim! Tim Kancah akan segera menghubungi.');
            e.target.reset();
        };
    async function loadLinks() {
        // Ganti 'supabase' menjadi 'kancah'
        const { data, error } = await kancah.from('links').select('*').order('sort_order', {ascending: true});
        
        if (error) {
            console.error("Error loading links:", error);
            return;
        }

        const container = document.getElementById('links-container');
        container.innerHTML = data.map(l => `
            <a href="${l.url}" onclick="trackClick(${l.id})" target="_blank" 
               class="block bg-white border border-slate-100 py-4 px-6 rounded-full font-bold uppercase text-[11px] tracking-[0.2em] text-slate-900 text-center hover:bg-[#0006ff] hover:text-white transition-all shadow-sm">
               ${l.title}
            </a>
        `).join('');
    }

    async function trackClick(id) {
        // Ganti 'supabase' menjadi 'kancah'
        const { data } = await kancah.from('links').select('clicks').eq('id', id).single();
        await kancah.from('links').update({ clicks: (data.clicks || 0) + 1 }).eq('id', id);
    }

    document.getElementById('leadForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = 'MENGIRIM...';
        
        // Ganti 'supabase' menjadi 'kancah'
        await kancah.from('leads').insert([{
            nama: document.getElementById('nama').value,
            whatsapp: document.getElementById('wa').value
        }]);
        
        alert('Pesan terkirim, tim Kancah segera hubungi!');
        document.getElementById('leadForm').reset();
        btn.innerText = 'KIRIM PESAN';
    };

    loadLinks();
</script>
</body>
</html>
