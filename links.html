<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links • Kancah Creative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #09090b; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-4px) scale(1.01); background: rgba(255, 255, 255, 0.08); border-color: rgba(0, 6, 255, 0.5); }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-16 px-4 selection:bg-blue-600">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-purple-900/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="flex flex-col items-center text-center mb-10 animate-in fade-in zoom-in duration-700">
      <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-600 to-blue-800 p-[2px] mb-6 shadow-2xl shadow-blue-500/20">
    <img src="assets/logowh.png" class="w-full h-full rounded-full object-cover bg-black" ...>
</div>
        <h1 class="text-3xl font-extrabold tracking-tight">Kancah Creative</h1>
        <p class="text-zinc-400 mt-2 text-sm max-w-xs">Digital & creative agency based in Yogyakarta. Turning ideas into digital reality.</p>
    </div>

    <div id="links-container" class="w-full max-w-[400px] space-y-4">
        <div class="text-center py-10 text-zinc-600">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
    </div>

    <div class="flex gap-6 mt-12">
        <a href="https://instagram.com/kancahcom" class="text-zinc-400 hover:text-white text-xl transition-colors"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://linkedin.com/company/kancah/" class="text-zinc-400 hover:text-white text-xl transition-colors"><i class="fa-brands fa-linkedin"></i></a>
        <a href="https://wa.me/6289524687866" class="text-zinc-400 hover:text-white text-xl transition-colors"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

    <script>
        const kancah = supabase.createClient('https://hmzwjceomnneiczbpban.supabase.co', 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__');

        async function loadLinks() {
            const container = document.getElementById('links-container');
            const { data } = await kancah.from('links').select('*').order('sort_order', { ascending: true });

            if (!data) return;

            container.innerHTML = data.map((l, i) => `
                <a href="${l.url}" target="_blank" 
                   class="glass hover-lift flex items-center justify-between p-4 rounded-2xl group transition-all duration-300">
                    <span class="font-semibold text-sm tracking-wide uppercase">${l.title}</span>
                    <i class="fa-solid fa-arrow-right text-xs opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                </a>
            `).join('');
        }

        loadLinks();
    </script>
</body>
</html>
