<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... • Kancah Creative</title>
    <meta id="meta-desc" name="description" content="Membaca insight terbaru dari Kancah Creative.">
    <link rel="icon" type="image/png" href="./assets/logowh.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill Content Styling (Penting untuk render konten HTML) -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Ubuntu', sans-serif; }
        .footer-marquee-content { display: flex; width: max-content; animation: footer-marquee 20s linear infinite; }
        @keyframes footer-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* Typography untuk konten blog agar terlihat profesional */
        .post-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; }
        .post-content h2 { font-size: 2rem; font-weight: 700; margin: 2rem 0 1rem; }
        .post-content p { margin-bottom: 1.5rem; line-height: 1.8; color: #374151; }
        .post-content img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; }
        .post-content blockquote { border-left: 4px solid #0006ff; padding-left: 1.5rem; font-style: italic; margin: 2rem 0; }
    </style>
</head>
<body class="bg-white text-kancah-dark">

    <!-- Navbar -->
    <nav class="fixed w-full z-[100] top-0 bg-white/80 backdrop-blur-xl border-b border-gray-100 h-20 flex justify-between items-center px-6 md:px-12">
        <a href="/"><img src="assets/kancah-logo.png" class="h-8 w-auto"></a>
        <a href="blog" class="text-kancah-blue font-bold uppercase tracking-widest text-[10px]">Back to Journal</a>
    </nav>

    <!-- Main Content -->
    <main class="pt-32 pb-24 max-w-3xl mx-auto px-6">
        <article id="article-container" class="opacity-0 transition-opacity duration-700">
            <!-- Header Artikel -->
            <div class="mb-10">
                <span id="post-date" class="text-gray-400 text-xs font-bold uppercase tracking-widest">Loading date...</span>
                <h1 id="post-title" class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic mt-3">Loading Title...</h1>
            </div>

            <!-- Hero Image -->
            <div id="hero-img-container" class="w-full h-[400px] bg-slate-100 rounded-[2rem] overflow-hidden mb-12">
                <img id="post-image" src="" class="w-full h-full object-cover">
            </div>

            <!-- Konten Artikel -->
            <div id="post-content" class="post-content text-lg font-light">
                <!-- Data HTML dari Supabase masuk sini -->
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-kancah-dark text-white border-t border-white/10">
        <div class="w-full py-4 border-b border-white/10 bg-white/5">
            <div class="footer-marquee-content flex gap-12 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">
                <span>Strategy</span> • <span>Branding</span> • <span>Digital</span> • <span>Motion</span> • <span>Development</span>
                <span>Strategy</span> • <span>Branding</span> • <span>Digital</span> • <span>Motion</span> • <span>Development</span>
            </div>
        </div>
        <div class="max-w-[1440px] mx-auto px-6 md:px-12 py-16 text-center text-[10px] font-bold tracking-widest uppercase text-gray-500">
            © 2026 PT. Kancah Media Sejahtera.
        </div>
    </footer>

    <script>
           const kancahUrl = 'https://hmzwjceomnneiczbpban.supabase.co';
        const kancahKey = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
        const kancah = supabase.createClient(kancahUrl, kancahKey);
        const slug = new URLSearchParams(window.location.search).get('slug');

        async function loadPost() {
            if (!slug) window.location.href = 'blog.html';
            
            const { data, error } = await kancah.from('posts').select('*').eq('slug', slug).single();
            
            if (error || !data) {
                document.body.innerHTML = '<div class="min-h-screen flex items-center justify-center font-black">404 NOT FOUND</div>';
                return;
            }

            // Update DOM
            document.title = data.title + ' • Kancah Creative';
            document.getElementById('post-title').innerText = data.title;
            document.getElementById('post-date').innerText = new Date(data.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});
            document.getElementById('post-image').src = data.image_url;
            document.getElementById('post-content').innerHTML = data.content_html;
            document.getElementById('meta-desc').content = data.excerpt;
            
            document.getElementById('article-container').classList.add('opacity-100');
        }
        loadPost();
    </script>
</body>
</html>
