<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... • Kancah</title>
    <link rel="icon" type="image/png" href="/assets/logowh.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin:0; background-color:#111111; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; }
    </style>
</head>
<body>

    <h2 id="loading-text">⏳ Sedang menyiapkan halaman...</h2>

    <script>
        // 1. Ambil nama slug dari URL bar (misal: kampiun.online/toko-baju -> path-nya "toko-baju")
        const path = window.location.pathname.replace(/^\/|\/$/g, ''); // ilangin garis miring
        const slug = path.split('/').pop(); // Ambil kata terakhir

        if (!slug) {
            document.getElementById('loading-text').innerText = "❌ 404 - Halaman Tidak Ditemukan.";
        } else {
            
            // 2. Konek ke Supabase
            const SB_URL = 'https://hmzwjceomnneiczbpban.supabase.co';
            const SB_KEY = 'sb_publishable_s5OWo5nHTHSv_MLYUxRLoA_xh97qS__';
            const kancah = supabase.createClient(SB_URL, SB_KEY);

            async function loadPage() {
                try {
                    // Cari project di tabel berdasarkan slug
                    const { data, error } = await kancah.from('projects').select('demo_url, title').eq('slug', slug).single();
                    
                    // Kalau slug-nya ngawur / datanya nggak ada di database
                    if (error || !data) {
                        document.title = "404 Not Found";
                        document.getElementById('loading-text').innerHTML = "❌ 404<br><span style='font-size:14px; color:#888;'>Halaman atau demo tidak ditemukan.</span>";
                        return;
                    }

                    // Kalau datanya ADA, ganti title tab dan load web aslinya!
                    document.title = `${data.title} - Live Preview`;
                    
                    const response = await fetch(data.demo_url);
                    const htmlText = await response.text();

                    // Suntik script penjinak (biar link di dalam demo gak bisa diklik)
                    const scriptPenjinak = `
                        <script>
                            document.addEventListener('click', function(e) {
                                const link = e.target.closest('a');
                                if(link) e.preventDefault();
                            });
                        <\/script>
                    `;

                    // BOOM! Timpa seluruh halaman 404 ini dengan web aslinya
                    document.open();
                    document.write(htmlText + scriptPenjinak);
                    document.close();

                } catch (err) {
                    console.error(err);
                    document.getElementById('loading-text').innerText = "❌ Terjadi kesalahan sistem.";
                }
            }

            loadPage();
        }
    </script>
</body>
</html>
